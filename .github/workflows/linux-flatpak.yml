name: Linux Flatpak

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Flatpak and tarball
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder dbus-x11
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Linux artifacts
        run: dbus-run-session -- npm run release:linux

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JestersGameVault-linux
          path: |
            artifacts/github-beta/*.flatpak
            artifacts/github-beta/*.tar.gz
          if-no-files-found: error

      - name: Attach artifacts to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/github-beta/*.flatpak
            artifacts/github-beta/*.tar.gz
