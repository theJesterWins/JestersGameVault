name: Windows Beta

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows beta zip
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Package Windows app
        shell: pwsh
        run: npm run pack:win

      - name: Sign beta EXE
        shell: pwsh
        continue-on-error: true
        run: npm run sign:beta

      - name: Create Windows beta zip
        shell: pwsh
        run: npm run zip:beta

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: JestersGameVault-windows
          path: artifacts/github-beta/*.zip
          if-no-files-found: error

      - name: Attach artifact to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: artifacts/github-beta/*.zip
